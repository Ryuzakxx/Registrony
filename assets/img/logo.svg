  <path d="M21.5 18.5 Q24 15 26.5 18.5" stroke="#93c5fd" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <line x1="24" y1="19" x2="24" y2="26" stroke="#93c5fd" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="21" y1="26" x2="27" y2="26" stroke="#3b82f6" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Squadra (strumento tecnico) -->
  <path d="M15.5 25.5 L15.5 30 L20 30" stroke="#60a5fa" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Testo FERMI in basso -->
  <text x="24" y="40" font-family="Arial, sans-serif" font-size="4.5" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="1.5">FERMI</text>
