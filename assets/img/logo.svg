<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="Registrony - ITT Fermi" role="img">
  <!-- Sfondo scuro -->
  <rect width="48" height="48" rx="10" fill="#0f1e30"/>

  <!-- Ingranaggio esterno (bordo dentato) -->
  <path d="
    M24 5
    L25.8 8.2 L29.4 7.5 L30.2 11 L33.6 11.8 L32.5 15.2
    L35.5 17.2 L33.5 20.2 L35.5 23.5 L32.2 25
    L33 28.6 L29.5 29.4 L28.8 33 L25.2 32.2
    L24 35.5 L22.8 32.2 L19.2 33 L18.5 29.4
    L15 28.6 L15.8 25 L12.5 23.5 L14.5 20.2
    L12.5 17.2 L15.5 15.2 L14.4 11.8 L17.8 11
    L18.6 7.5 L22.2 8.2 Z
  " fill="#1e3a5f" stroke="#2563eb" stroke-width="0.8"/>

  <!-- Cerchio interno bianco -->
  <circle cx="24" cy="20.5" r="11" fill="#0f1e30" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="24" cy="20.5" r="9.5" fill="#1e3a5f"/>

  <!-- Antenna parabolica (ispirata logo Fermi) -->
