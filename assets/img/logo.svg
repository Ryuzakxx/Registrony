<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="ITT Fermi - Registrony" role="img">

  <!-- Sfondo -->
  <rect width="48" height="48" rx="10" fill="#1a56b0"/>

  <!-- Ingranaggio semplificato (8 denti) -->
  <circle cx="24" cy="24" r="20" fill="#1a56b0"/>

  <!-- Denti ingranaggio -->
  <rect x="21" y="2" width="6" height="6" rx="1.5" fill="#ffffff"/>
  <rect x="21" y="40" width="6" height="6" rx="1.5" fill="#ffffff"/>
  <rect x="2" y="21" width="6" height="6" rx="1.5" fill="#ffffff"/>
  <rect x="40" y="21" width="6" height="6" rx="1.5" fill="#ffffff"/>

  <!-- Denti diagonali -->
  <rect x="6.5" y="7.5" width="6" height="6" rx="1.5" fill="#ffffff" transform="rotate(45 9.5 10.5)"/>
  <rect x="35.5" y="7.5" width="6" height="6" rx="1.5" fill="#ffffff" transform="rotate(45 38.5 10.5)"/>
  <rect x="6.5" y="34.5" width="6" height="6" rx="1.5" fill="#ffffff" transform="rotate(45 9.5 37.5)"/>
  <rect x="35.5" y="34.5" width="6" height="6" rx="1.5" fill="#ffffff" transform="rotate(45 38.5 37.5)"/>

  <!-- Cerchio interno bianco -->
  <circle cx="24" cy="24" r="15" fill="#ffffff"/>

  <!-- Lettera F bold centrata -->
  <text x="24" y="32" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#1a56b0" text-anchor="middle">F</text>

</svg>