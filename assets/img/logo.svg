<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="Registrony logo" role="img">
  <!-- Background -->
  <rect width="48" height="48" rx="11" fill="#0f1e30"/>

  <!-- Notebook body -->
  <rect x="11" y="9" width="22" height="28" rx="2.5" fill="#1e3a5f"/>

  <!-- Notebook spine -->
  <rect x="11" y="9" width="4" height="28" rx="2" fill="#2563eb"/>

  <!-- Spiral dots on spine -->
  <circle cx="13" cy="15" r="1.3" fill="#93c5fd"/>
  <circle cx="13" cy="20" r="1.3" fill="#93c5fd"/>
  <circle cx="13" cy="25" r="1.3" fill="#93c5fd"/>
  <circle cx="13" cy="30" r="1.3" fill="#93c5fd"/>

  <!-- Lines on page -->
  <rect x="18" y="15" width="12" height="1.8" rx="0.9" fill="#93c5fd" opacity="0.9"/>
  <rect x="18" y="19.5" width="10" height="1.8" rx="0.9" fill="#93c5fd" opacity="0.6"/>
  <rect x="18" y="24" width="11" height="1.8" rx="0.9" fill="#93c5fd" opacity="0.6"/>
  <rect x="18" y="28.5" width="8" height="1.8" rx="0.9" fill="#93c5fd" opacity="0.4"/>

  <!-- Badge circle -->
  <circle cx="35" cy="35" r="8" fill="#0f1e30"/>
  <circle cx="35" cy="35" r="6.5" fill="#3b82f6"/>

  <!-- Checkmark -->
  <path d="M31.5 35.2 L34 37.7 L38.5 32.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>